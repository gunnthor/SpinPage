<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpinPage</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #06060d;
            color: #e8dfc8;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image:
                radial-gradient(ellipse 90% 40% at 50% 0%, rgba(212,175,55,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 30% at 10% 80%, rgba(140,30,30,0.05) 0%, transparent 50%),
                radial-gradient(ellipse 60% 30% at 90% 80%, rgba(30,80,140,0.05) 0%, transparent 50%);
        }

        /* ── Header ── */

        header {
            padding: 2rem 2rem 0.8rem;
            text-align: center;
        }

        h1 {
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #f8ee80, #d4af37, #8b6914, #d4af37, #f8ee80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.62rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #4a4030;
            margin-top: 0.3rem;
        }

        /* ── Layout ── */

        .container {
            display: flex;
            gap: 2.5rem;
            padding: 1rem 2rem 2.5rem;
            width: 100%;
            max-width: 1080px;
            align-items: flex-start;
            justify-content: center;
        }

        /* ── Name panel ── */

        .name-panel {
            width: 255px;
            flex-shrink: 0;
            background: linear-gradient(160deg, #0d0d1a, #090910);
            border-radius: 14px;
            padding: 1.5rem;
            border: 1px solid #1e1a30;
            box-shadow:
                0 0 40px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(212,175,55,0.08);
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
        }

        .panel-title {
            font-size: 0.62rem;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .panel-title::before,
        .panel-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, #2a2040);
        }
        .panel-title::after { background: linear-gradient(to left, transparent, #2a2040); }

        .add-row { display: flex; gap: 0.45rem; }

        .add-row input {
            flex: 1;
            padding: 0.6rem 0.9rem;
            background: #09090f;
            border: 1px solid #1e1a30;
            border-radius: 8px;
            color: #e8dfc8;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .add-row input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 2px rgba(212,175,55,0.12);
        }

        .add-row input::placeholder { color: #2e2840; }

        .add-btn {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            border: none;
            border-radius: 8px;
            background: linear-gradient(145deg, #d4af37, #8b6914);
            color: #060608;
            font-size: 1.5rem;
            font-weight: 900;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter 0.2s, transform 0.1s;
        }

        .add-btn:hover  { filter: brightness(1.2); }
        .add-btn:active { transform: scale(0.9); }

        .name-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            max-height: 430px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .name-list::-webkit-scrollbar { width: 3px; }
        .name-list::-webkit-scrollbar-track { background: transparent; }
        .name-list::-webkit-scrollbar-thumb { background: #2a2040; border-radius: 4px; }

        .name-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 0.75rem;
            background: #09090f;
            border: 1px solid #16141f;
            border-left: 3px solid var(--accent, #d4af37);
            border-radius: 7px;
            font-size: 0.88rem;
            animation: slideIn 0.18s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .name-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #b8af98;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #2e2840;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 2px;
            line-height: 1;
            flex-shrink: 0;
            transition: color 0.15s;
        }

        .remove-btn:hover { color: #c0392b; }

        .empty-msg {
            color: #2e2840;
            font-size: 0.82rem;
            font-style: italic;
            text-align: center;
            padding: 0.8rem 0;
        }

        /* ── Wheel panel ── */

        .wheel-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .wheel-wrap {
            position: relative;
            width: 480px;
            height: 480px;
            filter: drop-shadow(0 0 28px rgba(212,175,55,0.15))
                    drop-shadow(0 20px 40px rgba(0,0,0,0.7));
        }

        canvas { display: block; }

        .btn-row {
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }

        .spin-btn {
            padding: 0.9rem 3.2rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(145deg, #c0392b, #96281b);
            color: #fff;
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow:
                0 4px 24px rgba(192,57,43,0.45),
                inset 0 1px 0 rgba(255,255,255,0.12);
            transition: filter 0.15s, transform 0.12s, box-shadow 0.15s, opacity 0.2s;
        }

        .spin-btn:hover:not(:disabled) {
            filter: brightness(1.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(192,57,43,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .spin-btn:active:not(:disabled) { transform: translateY(0); }

        .spin-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Auto button */

        .auto-btn {
            padding: 0.9rem 1.5rem;
            border-radius: 50px;
            background: #09090f;
            border: 1px solid #1e1a30;
            color: #4a4030;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap;
        }

        .auto-btn:hover:not(:disabled) { border-color: #d4af37; color: #d4af37; }

        .auto-btn.on {
            background: rgba(212,175,55,0.08);
            border-color: #d4af37;
            color: #d4af37;
            animation: pulse-gold 1.8s ease-in-out infinite;
        }

        .auto-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Reset button */

        .reset-btn {
            padding: 0.9rem 1.2rem;
            border-radius: 50px;
            background: #09090f;
            border: 1px solid #1e1a30;
            color: #3a3050;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.22s;
        }

        .reset-btn:hover { border-color: #c0392b; color: #c0392b; }

        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 8px rgba(212,175,55,0.15); }
            50%       { box-shadow: 0 0 20px rgba(212,175,55,0.35); }
        }

        /* ── Fire canvas ── */

        #fireCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        header, .container, .draft-section {
            position: relative;
            z-index: 1;
        }

        /* ── Winner overlay ── */

        .winner-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.87);
            backdrop-filter: blur(7px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s;
        }

        .winner-overlay.show { opacity: 1; pointer-events: all; }

        .winner-card {
            background: linear-gradient(160deg, #0e0e1c, #080810);
            border-radius: 20px;
            padding: 3rem 5rem;
            text-align: center;
            border: 1px solid #1e1a30;
            border-top: 2px solid var(--win-color, #d4af37);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 80px var(--win-glow, rgba(212,175,55,0.1));
            transform: scale(0.75);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .winner-overlay.show .winner-card { transform: scale(1); }

        .winner-label {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: #4a4030;
            margin-bottom: 0.6rem;
        }

        .winner-suits {
            font-size: 1.4rem;
            letter-spacing: 0.35em;
            color: #d4af37;
            margin-bottom: 0.6rem;
            opacity: 0.7;
        }

        .winner-name {
            font-family: 'Palatino Linotype', Palatino, Georgia, serif;
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            word-break: break-word;
            margin-bottom: 1.2rem;
            text-shadow: 0 0 40px currentColor;
        }

        .winner-sub { font-size: 0.7rem; color: #2e2840; letter-spacing: 0.06em; }

        /* ── Draft order ── */

        .draft-section {
            width: 100%;
            max-width: 1080px;
            padding: 0 2rem 3.5rem;
            display: none;
            flex-direction: column;
            gap: 1rem;
        }

        .draft-section.visible { display: flex; }

        .draft-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .draft-title {
            font-size: 0.62rem;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .draft-rule {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, #2a2040, transparent);
        }

        .draft-clear {
            background: none;
            border: 1px solid #1e1a30;
            border-radius: 6px;
            color: #2e2840;
            font-size: 0.68rem;
            letter-spacing: 0.06em;
            padding: 0.22rem 0.65rem;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .draft-clear:hover { border-color: #c0392b; color: #c0392b; }

        .draft-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.65rem;
        }

        .draft-card {
            background: linear-gradient(160deg, #0e0e1c, #080810);
            border: 1px solid #16141f;
            border-top: 2px solid var(--accent);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            min-width: 100px;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            animation: popIn 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8) translateY(8px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .draft-pick-num {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #4a4030;
        }

        .draft-name {
            font-size: 0.92rem;
            font-weight: 700;
            color: #e8dfc8;
            word-break: break-word;
        }
    </style>
</head>
<body>

<canvas id="fireCanvas"></canvas>

<header>
    <h1>♦ SpinPage ♦</h1>
    <div class="subtitle">Fortune Favors the Bold</div>
</header>

<div class="container">

    <div class="name-panel">
        <div class="panel-title">Players</div>
        <div class="add-row">
            <input type="text" id="nameInput" placeholder="Enter a name…" maxlength="30" autocomplete="off">
            <button class="add-btn" id="addBtn" title="Add">+</button>
        </div>
        <ul class="name-list" id="nameList"></ul>
    </div>

    <div class="wheel-panel">
        <div class="wheel-wrap">
            <canvas id="wheel" width="480" height="480"></canvas>
        </div>
        <div class="btn-row">
            <button class="spin-btn" id="spinBtn" disabled>SPIN</button>
            <button class="auto-btn" id="autoBtn" disabled>AUTO</button>
            <button class="reset-btn" id="resetBtn">RESET</button>
        </div>
    </div>

</div>

<section class="draft-section" id="draftSection">
    <div class="draft-header">
        <span class="draft-title">♠ Draft Order ♠</span>
        <div class="draft-rule"></div>
        <button class="draft-clear" id="draftClear">Clear</button>
    </div>
    <div class="draft-grid" id="draftGrid"></div>
</section>

<div class="winner-overlay" id="winnerOverlay">
    <div class="winner-card" id="winnerCard">
        <div class="winner-label">Winner</div>
        <div class="winner-suits">♠ ♥ ♦ ♣</div>
        <div class="winner-name" id="winnerName"></div>
        <div class="winner-sub">Removing from the table…</div>
    </div>
</div>

<script>
    const canvas  = document.getElementById('wheel');
    const ctx     = canvas.getContext('2d');
    const SIZE    = canvas.width;   // 480
    const cx      = SIZE / 2;       // 240
    const cy      = SIZE / 2;       // 240
    const R       = cx - 12;        // 228

    const nameInput     = document.getElementById('nameInput');
    const addBtn        = document.getElementById('addBtn');
    const nameListEl    = document.getElementById('nameList');
    const spinBtn       = document.getElementById('spinBtn');
    const autoBtn       = document.getElementById('autoBtn');
    const winnerOverlay = document.getElementById('winnerOverlay');
    const winnerNameEl  = document.getElementById('winnerName');
    const winnerCard    = document.getElementById('winnerCard');
    const draftSection  = document.getElementById('draftSection');
    const draftGrid     = document.getElementById('draftGrid');
    const draftClear    = document.getElementById('draftClear');

    let names      = [];
    let rotation   = 0;
    let isSpinning = false;
    let autoSpin   = false;
    let draftOrder = [];

    /* Deep casino palette */
    const PALETTE = [
        '#b03a2e','#1a5276','#1e8449','#b7950b','#6c3483',
        '#117a65','#935116','#154360','#196f3d','#7b241c',
        '#4a235a','#0e6251','#784212','#1b4f72','#922b21',
    ];

    function sliceColor(i) { return PALETTE[i % PALETTE.length]; }

    /* ── Ordinal ── */
    function ordinal(n) {
        const s = ['th','st','nd','rd'];
        const v = n % 100;
        return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }

    /* ── Draft ── */
    function renderDraft() {
        draftSection.classList.toggle('visible', draftOrder.length > 0);
        draftGrid.innerHTML = '';
        draftOrder.forEach((pick, i) => {
            const card = document.createElement('div');
            card.className = 'draft-card';
            card.style.setProperty('--accent', pick.color);

            const num = document.createElement('div');
            num.className = 'draft-pick-num';
            num.textContent = ordinal(i + 1) + ' pick';

            const name = document.createElement('div');
            name.className = 'draft-name';
            name.textContent = pick.name;

            card.append(num, name);
            draftGrid.appendChild(card);
        });
    }

    draftClear.addEventListener('click', () => { draftOrder = []; renderDraft(); });

    /* ── Reset ── */
    const resetBtn = document.getElementById('resetBtn');

    resetBtn.addEventListener('click', () => {
        if (isSpinning) return;
        names      = [];
        draftOrder = [];
        rotation   = 0;
        autoSpin   = false;
        autoBtn.classList.remove('on');
        autoBtn.textContent = 'AUTO';
        renderList();
        renderDraft();
        redraw();
    });

    /* ── List ── */
    function renderList() {
        nameListEl.innerHTML = '';
        if (names.length === 0) {
            const li = document.createElement('li');
            li.className = 'empty-msg';
            li.textContent = 'No players at the table';
            nameListEl.appendChild(li);
        } else {
            names.forEach((name, i) => {
                const li  = document.createElement('li');
                li.className = 'name-item';
                li.style.setProperty('--accent', sliceColor(i));

                const txt = document.createElement('span');
                txt.className = 'name-text';
                txt.textContent = name;

                const btn = document.createElement('button');
                btn.className = 'remove-btn';
                btn.textContent = '×';
                btn.dataset.index = i;
                btn.title = 'Remove';

                li.append(txt, btn);
                nameListEl.appendChild(li);
            });
        }
        const hasNames = names.length > 0;
        spinBtn.disabled = !hasNames || isSpinning;
        autoBtn.disabled = !hasNames || isSpinning;
    }

    nameListEl.addEventListener('click', e => {
        const btn = e.target.closest('.remove-btn');
        if (!btn || isSpinning) return;
        names.splice(+btn.dataset.index, 1);
        if (names.length === 0 && autoSpin) {
            autoSpin = false;
            autoBtn.classList.remove('on');
            autoBtn.textContent = 'AUTO';
        }
        renderList();
        redraw();
    });

    /* ── Add ── */
    function addName() {
        const val = nameInput.value.trim();
        if (!val) return;
        names.push(val);
        nameInput.value = '';
        renderList();
        redraw();
    }

    addBtn.addEventListener('click', addName);
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') addName(); });

    /* ── Draw ── */
    function drawWheel() {
        ctx.clearRect(0, 0, SIZE, SIZE);

        if (names.length === 0) {
            const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
            bg.addColorStop(0, '#161022');
            bg.addColorStop(1, '#08080e');
            ctx.beginPath();
            ctx.arc(cx, cy, R, 0, 2 * Math.PI);
            ctx.fillStyle = bg;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(cx, cy, R, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(212,175,55,0.18)';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.fillStyle = '#3a3050';
            ctx.font = 'italic 15px Palatino Linotype, Palatino, Georgia, serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Add players to spin', cx, cy);
            return;
        }

        const arc = (2 * Math.PI) / names.length;

        for (let i = 0; i < names.length; i++) {
            const start = rotation - Math.PI / 2 + i * arc;
            const end   = start + arc;
            const mid   = (start + end) / 2;

            /* Base fill */
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, R, start, end);
            ctx.closePath();
            ctx.fillStyle = sliceColor(i);
            ctx.fill();

            /* Radial shine */
            const shine = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
            shine.addColorStop(0, 'rgba(255,255,255,0.1)');
            shine.addColorStop(0.55, 'rgba(255,255,255,0.03)');
            shine.addColorStop(1, 'rgba(0,0,0,0.25)');
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, R, start, end);
            ctx.closePath();
            ctx.fillStyle = shine;
            ctx.fill();

            /* Label */
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(mid);

            const textDist = R * 0.62;
            const maxW     = R * 0.52;
            const fs = names.length > 14 ? 9 : names.length > 9 ? 11 : names.length > 5 ? 13 : 15;
            ctx.font = `bold ${fs}px Segoe UI, system-ui, sans-serif`;
            ctx.textAlign    = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle    = 'rgba(255,255,255,0.95)';
            ctx.shadowColor  = 'rgba(0,0,0,0.9)';
            ctx.shadowBlur   = 5;

            let label = names[i];
            while (ctx.measureText(label).width > maxW && label.length > 2) {
                label = label.slice(0, -1);
            }
            if (label !== names[i]) label += '…';

            ctx.fillText(label, textDist, 0);
            ctx.restore();
        }

        /* Gold dividers */
        for (let i = 0; i < names.length; i++) {
            const angle = rotation - Math.PI / 2 + i * (2 * Math.PI / names.length);
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(angle) * R, cy + Math.sin(angle) * R);
            ctx.strokeStyle = 'rgba(212,175,55,0.4)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        /* Outer gold ring */
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, 2 * Math.PI);
        ctx.strokeStyle = 'rgba(212,175,55,0.55)';
        ctx.lineWidth = 4;
        ctx.stroke();

        /* Inner decorative ring */
        ctx.beginPath();
        ctx.arc(cx, cy, R - 9, 0, 2 * Math.PI);
        ctx.strokeStyle = 'rgba(212,175,55,0.12)';
        ctx.lineWidth = 1;
        ctx.stroke();

        /* Gold center hub */
        const hub = ctx.createRadialGradient(cx, cy, 0, cx, cy, 22);
        hub.addColorStop(0, '#f5e070');
        hub.addColorStop(0.45, '#d4af37');
        hub.addColorStop(1, '#6b5010');
        ctx.beginPath();
        ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
        ctx.fillStyle = hub;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,230,100,0.3)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    function drawPointer() {
        const tipX  = cx;
        const tipY  = 22;
        const baseY = 3;
        const halfW = 15;

        /* Glow */
        ctx.shadowColor = 'rgba(212,175,55,0.8)';
        ctx.shadowBlur  = 18;

        /* Gold gradient triangle */
        const pg = ctx.createLinearGradient(tipX - halfW, 0, tipX + halfW, 0);
        pg.addColorStop(0,   '#6b5010');
        pg.addColorStop(0.5, '#f5e070');
        pg.addColorStop(1,   '#6b5010');

        ctx.beginPath();
        ctx.moveTo(tipX - halfW, baseY);
        ctx.lineTo(tipX + halfW, baseY);
        ctx.lineTo(tipX, tipY);
        ctx.closePath();
        ctx.fillStyle = pg;
        ctx.fill();
        ctx.shadowBlur = 0;

        /* Tip jewel */
        ctx.beginPath();
        ctx.arc(tipX, tipY, 4.5, 0, 2 * Math.PI);
        ctx.fillStyle = '#fff';
        ctx.shadowColor = 'rgba(255,255,255,0.9)';
        ctx.shadowBlur  = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    function redraw() {
        drawWheel();
        drawPointer();
    }

    /* ── Auto spin ── */
    autoBtn.addEventListener('click', () => {
        if (names.length === 0) return;
        autoSpin = !autoSpin;
        autoBtn.classList.toggle('on', autoSpin);
        autoBtn.textContent = autoSpin ? 'AUTO: ON' : 'AUTO';
    });

    /* ── Spin ── */
    spinBtn.addEventListener('click', spin);

    function spin() {
        if (isSpinning || names.length === 0) return;

        isSpinning = true;
        spinBtn.disabled = true;
        autoBtn.disabled = true;

        const winnerIdx = Math.floor(Math.random() * names.length);
        const arc       = (2 * Math.PI) / names.length;

        /*
         * Pointer is at the top (−π/2 in canvas coords).
         * Section i center: rotation − π/2 + (i + 0.5) * arc
         * Land winner center at top: rotation = −(winnerIdx + 0.5) * arc  (mod 2π)
         */
        const winnerMid   = (winnerIdx + 0.5) * arc;
        const targetNorm  = ((2 * Math.PI - winnerMid % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
        const currentNorm = ((rotation % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);

        let delta = targetNorm - currentNorm;
        if (delta < 0) delta += 2 * Math.PI;

        const extraSpins = 6 + Math.floor(Math.random() * 4);   // 6–9 full rotations
        const totalRot   = extraSpins * 2 * Math.PI + delta;
        const duration   = 4200 + Math.random() * 1600;          // 4.2–5.8 s

        const startRot  = rotation;
        const endRot    = rotation + totalRot;
        const startTime = performance.now();

        function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

        function frame(now) {
            const t = Math.min((now - startTime) / duration, 1);
            rotation = startRot + (endRot - startRot) * easeOut(t);
            redraw();
            if (t < 1) {
                requestAnimationFrame(frame);
            } else {
                rotation = endRot;
                redraw();
                onSpinEnd(winnerIdx);
            }
        }

        requestAnimationFrame(frame);
    }

    function onSpinEnd(winnerIdx) {
        const c    = sliceColor(winnerIdx);
        const name = names[winnerIdx];

        winnerNameEl.textContent = name;
        winnerNameEl.style.color = c;
        winnerCard.style.setProperty('--win-color', c);
        winnerCard.style.setProperty('--win-glow', c + '28');

        winnerOverlay.classList.add('show');

        setTimeout(() => {
            winnerOverlay.classList.remove('show');

            setTimeout(() => {
                draftOrder.push({ name, color: c });
                renderDraft();
                names.splice(winnerIdx, 1);

                const hasNames = names.length > 0;
                isSpinning = false;

                if (!hasNames && autoSpin) {
                    autoSpin = false;
                    autoBtn.classList.remove('on');
                    autoBtn.textContent = 'AUTO';
                }

                renderList();
                redraw();

                if (autoSpin && hasNames) {
                    setTimeout(spin, 1400);
                }
            }, 380);
        }, 2800);
    }

    /* ── Fire ── */
    const fireCanvas = document.getElementById('fireCanvas');
    const fctx       = fireCanvas.getContext('2d');
    let fireParticles = [];

    function resizeFire() {
        fireCanvas.width  = window.innerWidth;
        fireCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeFire);
    resizeFire();

    function spawnFlame() {
        const W = fireCanvas.width;
        const H = fireCanvas.height;
        fireParticles.push({
            x:       Math.random() * W,
            y:       H,
            vx:      (Math.random() - 0.5) * 1.6,
            vy:      -(Math.random() * 3.8 + 1.8),
            life:    0,
            maxLife: Math.floor(Math.random() * 55 + 35),
            size:    Math.random() * 18 + 8,
        });
    }

    function fireColor(t) {
        let r, g, b;
        if (t < 0.22) {
            // White-yellow core
            const u = t / 0.22;
            r = 255; g = Math.round(255 - u * 55); b = Math.round(120 * (1 - u));
        } else if (t < 0.52) {
            // Orange
            const u = (t - 0.22) / 0.3;
            r = 255; g = Math.round(200 * (1 - u)); b = 0;
        } else if (t < 0.78) {
            // Red
            const u = (t - 0.52) / 0.26;
            r = Math.round(255 - u * 85); g = 0; b = 0;
        } else {
            // Dark red fade
            const u = (t - 0.78) / 0.22;
            r = Math.round(170 * (1 - u)); g = 0; b = 0;
        }
        return { r, g, b };
    }

    function fireLoop() {
        const W = fireCanvas.width;
        const H = fireCanvas.height;

        fctx.clearRect(0, 0, W, H);

        // Spawn flames this frame — denser near corners for drama
        const base = Math.max(1, Math.floor(W / 16));
        for (let i = 0; i < base; i++) {
            if (Math.random() < 0.55) spawnFlame();
        }
        // Extra bursts in the bottom corners
        if (Math.random() < 0.7) {
            fireParticles.push({
                x: Math.random() * W * 0.18,
                y: H, vx: (Math.random() - 0.3) * 2,
                vy: -(Math.random() * 5 + 2.5),
                life: 0, maxLife: Math.floor(Math.random() * 65 + 45),
                size: Math.random() * 22 + 12,
            });
            fireParticles.push({
                x: W - Math.random() * W * 0.18,
                y: H, vx: (Math.random() + 0.3 - 0.6) * 2,
                vy: -(Math.random() * 5 + 2.5),
                life: 0, maxLife: Math.floor(Math.random() * 65 + 45),
                size: Math.random() * 22 + 12,
            });
        }

        fireParticles = fireParticles.filter(p => {
            p.life++;
            p.x += p.vx + Math.sin(p.life * 0.13) * 0.9;
            p.y += p.vy;
            p.vy *= 0.99;
            p.size *= 0.981;

            if (p.life > p.maxLife || p.size < 0.5) return false;

            const t = p.life / p.maxLife;
            const { r, g, b } = fireColor(t);
            const alpha = Math.pow(1 - t, 1.6) * 0.78;

            const grad = fctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
            grad.addColorStop(0,   `rgba(${r},${g},${b},${alpha})`);
            grad.addColorStop(0.45,`rgba(${r},${Math.round(g * 0.4)},0,${(alpha * 0.65).toFixed(2)})`);
            grad.addColorStop(1,   `rgba(${Math.round(r * 0.2)},0,0,0)`);

            fctx.beginPath();
            fctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            fctx.fillStyle = grad;
            fctx.fill();

            return true;
        });

        requestAnimationFrame(fireLoop);
    }

    fireLoop();

    /* ── Init ── */
    renderList();
    renderDraft();
    redraw();
</script>
</body>
</html>
